<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookshelf Loader</title>
  <link rel="stylesheet" href="loader1.css">
</head>
<body>

  <div class="loader-screen" id="loaderScreen" aria-live="polite">
    <div class="loader-wrap">
      <img
        class="loader-brand-image"
        src="loader-logo-removebg-preview.png"
        alt="Dr. Virendra Swarup Institute of Computer Studies logo"
      >
      <div class="progress-block" aria-hidden="true">
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="loader-text">Loading <span id="progressValue">0%</span></p>
      </div>
    </div>
  </div>

<script>
window.addEventListener("load", () => {
    const loader = document.getElementById("loaderScreen");
    const bar = document.getElementById("progressBar");
    const val = document.getElementById("progressValue");

    if (!loader || !bar || !val) return;

    let progress = 0;
    const speed = 25; 

    const interval = setInterval(() => {
        progress += 1;

        bar.style.width = progress + "%";
        val.textContent = progress + "%";

        if (progress >= 100) {
            clearInterval(interval);
            
            setTimeout(() => {
                loader.classList.add("hidden");
            }, 200);
        }
    }, speed);
});

</script>
</body>
</html>
